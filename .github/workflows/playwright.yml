name: Playwright API Tests with Allure

on:
  push:
    branches: [main]
  pull_request:

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:
    inputs:
      test_type:
        description: "Which tests to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Step 2: Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install

      # ✅ Step 4: Decide test marker
      - name: Set test marker
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "MARKER=regression" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "MARKER=${{ github.event.inputs.test_type }}" >> $GITHUB_ENV
          else
            echo "MARKER=smoke" >> $GITHUB_ENV
          fi

      # ✅ Step 5: Run tests + generate Allure results
      - name: Run API tests
        env:
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          pytest -m $MARKER -v --alluredir=allure-results

      # ✅ Step 6: Install Allure CLI (NO Docker)
      - name: Install Allure CLI
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          curl -o allure.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      # ✅ Step 7: Generate Allure HTML report
      - name: Generate Allure HTML Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      # ✅ Step 8: Upload Allure HTML report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report

      # ✅ Step 9: Upload raw Allure results
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results